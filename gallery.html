<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Presley Pivonka Photography — capturing authentic family, senior, couples, and wedding moments in the Midwest.">

    <title>Gallery | Presley Pivonka Photography</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

	<link rel="icon" href="images/branding/favicon.ico" sizes="any">
	<link rel="icon" type="image/png" sizes="32x32" href="images/branding/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="192x192" href="images/branding/favicon-192x192.png">
	<link rel="apple-touch-icon" href="images/branding/favicon-192x192.png">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->

    <header>
        <div class="nav-wrapper">

            <div class="socials">
				<a href="https://instagram.com/presley.pivonka/" target="_blank" rel="noopener noreferrer" aria-label="Presley Pivonka on Instagram">
					<img src="images/branding/instagram.png" alt="">
				</a>

				<a href="https://facebook.com/presley.pivonka" target="_blank" rel="noopener noreferrer" aria-label="Presley Pivonka on Facebook">
					<img src="images/branding/facebook.png" alt="">
				</a>
            </div>

            <a href="index.html" class="logo">
                <p class="logo-name">PRESLEY PIVONKA</p>
                <span>PHOTOGRAPHY</span>
            </a>

            <nav aria-label="Main navigation">
                <ul>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="gallery.html" aria-current="page">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- MAIN -->

    <main class="container">

        <!-- PAGE HERO -->

        <section class="page-header">
            <h1>Gallery</h1>
            <p>
                Capturing authentic moments, genuine emotions,
                and memories that last a lifetime.
            </p>
        </section>

        <!-- FAMILY -->

        <section class="gallery-section">

            <h2>Family Sessions</h2>

            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="images/gallery/family/family-1.jpg" alt="Family walking together outdoors" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="images/gallery/family/family-2.jpg" alt="Parents laughing with their children" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="images/gallery/family/family-3.jpg" alt="Family portrait during golden hour" loading="lazy">
                </div>
            </div>

        </section>

        <!-- SENIORS -->

        <section class="gallery-section">

            <h2>Senior Portraits</h2>

            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="images/gallery/seniors/senior-1.jpg" alt="High school senior portrait outdoors" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="images/gallery/seniors/senior-2.jpg" alt="Senior portrait in natural light" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="images/gallery/seniors/senior-3.jpg" alt="Senior portrait with candid smile" loading="lazy">
                </div>
            </div>

        </section>

        <!-- COUPLES -->

        <section class="gallery-section">

            <h2>Couples</h2>

            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="images/gallery/couples/couple-1.jpg" alt="Couple holding hands in nature" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="images/gallery/couples/couple-2.jpg" alt="Engaged couple sharing a quiet moment" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="images/gallery/couples/couple-3.jpg" alt="Romantic couples portrait at sunset" loading="lazy">
                </div>
            </div>

        </section>

        <!-- WEDDINGS -->

        <section class="gallery-section">

            <h2>Weddings</h2>

            <div class="gallery-grid">
                <div class="gallery-item">
                    <img src="images/gallery/weddings/wedding-1.jpg" alt="Ceremony moment during an outdoor wedding" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="images/gallery/weddings/wedding-2.jpg" alt="Bride and groom portrait on their wedding day" loading="lazy">
                </div>
                <div class="gallery-item">
                    <img src="images/gallery/weddings/wedding-3.jpg" alt="Candid wedding reception celebration" loading="lazy">
                </div>
            </div>

        </section>

    </main>

    <div class="divider"></div>

    <!-- FOOTER -->

    <footer>

        <div class="footer-inner">

            <div class="footer-socials">
                <a href="https://instagram.com/presley.pivonka/" target="_blank" rel="noopener noreferrer" aria-label="Presley Pivonka on Instagram">
					<img src="images/branding/instagram.png" alt="">
				</a>

				<a href="https://facebook.com/presley.pivonka" target="_blank" rel="noopener noreferrer" aria-label="Presley Pivonka on Facebook">
					<img src="images/branding/facebook.png" alt="">
				</a>
            </div>

            <a href="index.html" class="footer-logo">
                <p class="logo-name">PRESLEY PIVONKA</p>
                <span>PHOTOGRAPHY</span>
            </a>

            <div class="footer-links">
                <ul>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>

        </div>

    </footer>

</body>
