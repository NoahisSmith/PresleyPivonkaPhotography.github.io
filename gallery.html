<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gallery | Presley Pivonka Photography</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

	<link rel="icon" href="images/branding/favicon.ico" sizes="any">
	<link rel="icon" type="image/png" sizes="32x32" href="images/branding/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="192x192" href="images/branding/favicon-192x192.png">
	<link rel="apple-touch-icon" href="images/branding/favicon-192x192.png">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->

    <header>
        <div class="nav-wrapper">

            <div class="socials">
				<a href="https://instagram.com/presley.pivonka/" target="_blank">
					<img src="images/branding/instagram.png" alt="Instagram">
				</a>

				<a href="https://facebook.com/presley.pivonka" target="_blank">
					<img src="images/branding/facebook.png" alt="Facebook">
				</a>
            </div>

            <a href="index.html" class="logo">
                <h1>PRESLEY PIVONKA</h1>
                <span>PHOTOGRAPHY</span>
            </a>

            <nav>
                <ul>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- MAIN -->

    <main class="container">

        <!-- PAGE HERO -->

        <section class="page-header">
            <h1>Gallery</h1>
            <p>
                Capturing authentic moments, genuine emotions,
                and memories that last a lifetime.
            </p>
        </section>

        <!-- FAMILY -->

        <section class="gallery-section">

            <h2>Family Sessions</h2>

            <div class="gallery-grid">
                <img src="images/gallery/family/family-1.jpg" alt="Family Session">
                <img src="images/gallery/family/family-2.jpg" alt="Family Session">
                <img src="images/gallery/family/family-3.jpg" alt="Family Session">
            </div>

        </section>

        <!-- SENIORS -->

        <section class="gallery-section">

            <h2>Senior Portraits</h2>

            <div class="gallery-grid">
                <img src="images/gallery/seniors/senior-1.jpg" alt="Senior Portrait">
                <img src="images/gallery/seniors/senior-2.jpg" alt="Senior Portrait">
                <img src="images/gallery/seniors/senior-3.jpg" alt="Senior Portrait">
            </div>

        </section>

        <!-- COUPLES -->

        <section class="gallery-section">

            <h2>Couples</h2>

            <div class="gallery-grid">
                <img src="images/gallery/couples/couple-1.jpg" alt="Couples Session">
                <img src="images/gallery/couples/couple-2.jpg" alt="Couples Session">
                <img src="images/gallery/couples/couple-3.jpg" alt="Couples Session">
            </div>

        </section>

        <!-- WEDDINGS -->

        <section class="gallery-section">

            <h2>Weddings</h2>

            <div class="gallery-grid">
                <img src="images/gallery/weddings/wedding-1.jpg" alt="Wedding Photography">
                <img src="images/gallery/weddings/wedding-2.jpg" alt="Wedding Photography">
                <img src="images/gallery/weddings/wedding-3.jpg" alt="Wedding Photography">
            </div>

        </section>

    </main>

    <div class="divider"></div>

    <!-- FOOTER -->

    <footer>

        <div class="footer-inner">

            <div class="footer-socials">
                <a href="https://instagram.com/" target="_blank">
					<img src="images/branding/instagram.png" alt="Instagram">
				</a>

				<a href="https://facebook.com/" target="_blank">
					<img src="images/branding/facebook.png" alt="Facebook">
				</a>
            </div>

            <a href="index.html" class="footer-logo">
                <h4>PRESLEY PIVONKA</h4>
                <span>PHOTOGRAPHY</span>
            </a>

            <div class="footer-links">
                <ul>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>

        </div>

    </footer>

</body>
</html>
